<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DayFlow • Goal Setup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="goal-container">
    <h1>🎯 What's your goal?</h1>
    <p class="subtitle">Pick a focus and duration</p>

    <form id="goalForm">
      <select id="goalType" required>
        <option value="">Select</option>
        <option value="fitness">Fitness / Fat loss</option>
        <option value="study">Study / Exam prep</option>
        <option value="skill">Skill learning</option>
        <option value="routine">Daily discipline</option>
      </select>
      <select id="goalDuration" required>
        <option value="7">1 week</option>
        <option value="30">1 month</option>
        <option value="90">3 months</option>
        <option value="365">1 year</option>
      </select>

      <button class="btn" type="submit">Next →</button>
    </form>

    <p style="margin-top:12px;"><a href="{{ url_for('dashboard_page') }}">Skip</a></p>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
